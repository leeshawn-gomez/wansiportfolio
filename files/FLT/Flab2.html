<!DOCTYPE html>
<html>
<head>
  <title>Flexbox Task</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
    }

    .c {
      margin-bottom: 20px;
      padding: 10px;
    }


    .a { 
        display: flex; 
    }
    .a div:first-child {
         width: 200px; background: lightblue; 
        }
    .a div:last-child {
         width: 75px; background: pink; 
        }

    .b {
         display: flex; 
        }

    .b div:first-child {
         width: 50px; background: lightblue; 
        }

    .b div:nth-child(2) {
         flex: 1; background: red; }
    .b div:last-child {
         width: 75px; background: pink; 
        }

    .d {
         display: flex; justify-content: space-between; 
        }

    .d div {
         background: red; 
        }

    .e {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 50px;
      border: 2px solid gray;
    }
    .e div {
      background: red;
      padding: 5px 10px;
    }


    .cc {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .h {
      width: 100%;
      height: 150px;
      background: beige;
      border: 1px solid red;
    }

    .m {
      background: #95e936;
      padding: 7px 0;
      border: 1px solid red;
    }

    .l {
      width: 30%;
      height: 250px;
      background: rgb(43,165,43);
      border: 1px solid red;
      padding: 7px;
    }

    .r {
      flex: 1;
      height: 250px;
      background: rgb(43,165,43);
      border: 1px solid red;
      padding: 7px;
    }

    .f {
      width: 100%;
      height: 100px;
      background: beige;
      border: 1px solid red;
    }

    hr { visibility: hidden; }


    @media (max-width: 800px) {
      .l, .r { width: 100%; }
    }

    @media (max-width: 400px) {
      .w { flex-direction: column; }
      .l, .r { height: 100px; }
    }
  </style>
</head>
<body>

  <h3>12a</h3>
  <div class="c a">
    <div>200px</div>
    <div>75px</div>
  </div>

  <h3>12b</h3>
  <div class="c b">
    <div>item1</div>
    <div>item2</div>
    <div>item3</div>
  </div>

  <h3>12c</h3>
  <div class="c d">
    <div>item1</div>
    <div>item2</div>
    <div>item3</div>
    <div>item4</div>
  </div>

  <h3>12d</h3>
  <div class="c e">
    <div>item1</div>
    <div>item2</div>
  </div>

  <hr><hr><hr><hr><hr><hr><hr><hr><hr><hr><hr><hr>

  <div class="h">This is a header</div>

  <div class="m">
    <div class="cc">
      <div class="l">Section left-nav</div>
      <div class="r">Section right-nav</div>
    </div>
  </div>

  <div class="f">This is a footer</div>

</body>
</html>
