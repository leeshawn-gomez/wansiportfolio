<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>midterms problem 3</title>

</head>
<style>

    body{ 
    border: 10px solid rgb(31, 98, 8);
    padding:30px;
    width: 916px;
    justify-content: center;
    margin: auto;
    margin-top: 10px;
    }

    #header{
    background-color: rgb(123, 224, 41);
    border: 2px solid rgb(123, 224, 41);
    height:100px;
    width: 906px;
    display: block;
    justify-content: space-between;
    align-items: center;
    padding-left: 10px;
    font-size: 20px;
    font-family: Arial, Helvetica, sans-serif;
    }

    #content{
    display: flex;
    gap: 20px;
    }

    #grid-container {
    display: grid;
    gap: 20px;
    grid-template-columns: 300px 300px;
    grid-template-rows:150px 150px 150px;
    background-color:  rgb(123, 224, 41);
    padding: 20px;
    width: fit-content;
    justify-content: center;
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    }

    .grid-item {
    border: 1px solid rgb(123, 224, 41);
    background-color: white;
    text-align: center;
    font-size: 20px;
    padding: 30px;
    }

    aside {
    float: right;
    width: 5000px;
    height: fit-content;
    }

    #sec1 {
    border:1px solid rgb(123, 224, 41);
    background-color: rgb(123, 224, 41);
    height: 530px;
    width: 213px;
    padding-left: 20px;
    font-size: 20px;
    font-family: Arial, Helvetica, sans-serif;
    }

    #foot {
    background-color: rgb(123, 224, 41);
    border:2px solid rgb(123, 224, 41);
    height: 70px;
    width: 906px;
    padding-left: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    font-family: Arial, Helvetica, sans-serif;
}


</style>
<body>
    <header id="header">
        <h1>My name is layout, grid layout</h1> 
    </header> 
   <br>
   <div id="content">
        <main id="grid-container">
                <div class="grid-item"><h2>Post 1</h2></div>
                <div class="grid-item"><h2>Post 2</h2></div>
                <div class="grid-item"><h2>Post 3</h2></div>
                <div class="grid-item"><h2>Post 4</h2></div>
                <div class="grid-item"><h2>Post 5</h2></div>
                <div class="grid-item"><h2>Post 6</h2></div>
        </main>
        <aside>
                <section>
                <div id="sec1"><h3>Sidebar</h3></div>
                </section>
                
            </aside>
    </div>
    <br>
    <footer id="foot">
        <h3> &copy; | Impress | Contact</h3> 
    </footer>
</body>
</html>
