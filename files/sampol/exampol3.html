<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       body {
        width: 640px;
        height: 960px;
        font-family: Arial, Helvetica, sans-serif;
        margin: auto;
       }

       * {
        border-radius: 4px;
        text-align: center;
       }
       
       #container {
        display: grid;
        grid-template-areas: 
        'header header'
        'nav nav'
        'aside main'
        'aside main'
        'aside main'
        'aside main'
        'aside section'
        'footer footer';
        gap: 10px;
        grid-template-columns: 150px 200px; 
       }

       header {
        background-color: rgba(254,120,143,255);
        font-size: x-large;
        grid-area: header; 
        height: 50px;
       }

       nav {
        background-color: rgba(69,274,167,255);
        grid-area: nav; 
       }

       main {
       background-color: rgba(201,236,255,255);
       grid-area: main; 
       padding: 10px;
       }

       aside {
        background-color: rgba(250,207,214,255);
        grid-area: aside; 
       }

       figure, p, article, section, header, aside, nav, footer, body {
        display: flex;
        justify-content: center;
        align-items: center;
       }

       article {
        background-color: rgba(112,219,253,255);
        padding: 10px;
        flex-direction: column
       }


       figure {
        background-color: rgba(254,242,180,255);
        width: 150px;
        height: 70px;
       }

       p {
        background-color: rgba(237,255,169,155);
        width: 150px;
        height: 100px;
        margin: 0;
       }

       section {
        background-color: rgba(2,168,254,255);
        grid-area: section;
        height: 50px;
       }

       footer {
        background-color: rgba(2,168,254,255);
        font-size: x-large;
        grid-area: footer;
        height: 50px;
       }
    </style>
</head>
<body>
    <div id="container">
        <header>header</header>

        <nav>nav</nav>

        <aside>aside</aside>

        <main>main
            <article>article
                <figure>figure</figure>
                <p>p</p>
            </article>
        </main>    

        <section>section</section>

        <footer>footer</footer>
    </div>  
</body>
</html>
